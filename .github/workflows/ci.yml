name: ci
on:
  push:
    branches: [main, stable]
    tags:
      - "v*"
  pull_request:
    branches: [main, stable]

permissions: read-all

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run fmt:check

  test:
    name: "Audit, lint, tests, and build"
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install modules
        run: npm ci
      - name: Audit for vulnerabilities
        run: npm run audit:ci
      - name: Run ESLint
        run: npm run lint
      - name: Run Tests
        run: npm test
      - name: Build App
        run: npm run build
        env:
          CI: true

  e2e:
    name: "End-to-end tests"
    runs-on: ubuntu-latest
    needs: format
    services:
      reductstore:
        image: reduct/store:main
        ports:
          - 8383:8383
        env:
          RS_CORS_ALLOW_ORIGIN: "*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Wait for ReductStore API
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8383/api/v1/info >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "ReductStore API is not reachable"
          docker ps
          exit 1
      - name: Run e2e tests
        run: npm run e2e
        env:
          RS_URL: http://127.0.0.1:8383
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  deploy:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: ${{ (github.ref == 'refs/heads/main') || (startsWith(github.event.ref, 'refs/tags/v')) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v2
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{github.repository}}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  make_release:
    runs-on: ubuntu-latest
    needs: [test, e2e]
    name: Make release
    if: ${{ startsWith(github.event.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
      - uses: actions/create-release@v1
        id: create_release
        with:
          draft: true
          prerelease: false
          release_name: Release ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref }}
          body: Copy changes from CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v2
      - name: Install modules
        run: npm install
      - name: Build app
        run: npm run build
        env:
          CI: false
      - name: Zip built application
        run: cd build && zip web-console.build.zip -r *
      - name: Upload  artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/web-console.build.zip
          asset_name: web-console.build.zip
          asset_content_type: application/zip
